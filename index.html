<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my gram</title>
  <link rel="stylesheet" href="styles/gram.css">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/middle.css">
</head>
<body class="body">
  <header class="heada">
    <span class="chwaki">Vlogs Stories Lifestyle</span>
    <!--
    <img
      class="visa"
      src="img/take-4.png" 
      alt="visa"
    >-->
  </header>
  <div class="middle-sec">
    <img 
      src="img/BACKII.jpg"
      alt="background"
      class="back-img"
    />
    
    
    <div class="gram">


       <div class="top">
        <div class="container">

            <input type="radio" name="slider" id="s1" checked >
            <input type="radio" name="slider" id="s2">
            <input type="radio" name="slider" id="s3">
            <input type="radio" name="slider" id="s4">
            <input type="radio" name="slider" id="s5">

          <div class="cards">

            <label for="s1" id="slide1">

              <div class="card">

                <div class="desc-b1x">
                  <img 
                  src="img/wanjix.png" 
                  alt="boinapetit"
                  class="desc-img">
                </div>

              </div>

            </label>

            <label for="s2" id="slide2">

              <div class="card">

                <div class="desc-b1x">
                  <img 
                  src="img/wanjiku-1-1.png" 
                  alt="boinapetit"
                  class="desc-img">
                </div>
              </div>

            </label>

            <label for="s3" id="slide3">

              <div class="card">

                <div class="desc-b1x">
                  <img 
                  src="img/gorg.png" 
                  alt="boinapetit"
                  class="desc-img">
                </div>
                <button class="checkout">my other socials</button>

              </div>

            </label>

            <label for="s4" id="slide4">

              

                <div class="card">

                <div class="desc-b1x">
                  <img 
                  src="img/grad.png" 
                  alt="boinapetit"
                  class="desc-img">
                </div>
                <p class="des-email">joyrono@gmail.com</p>
                <p class="des-phone">
                  +254 __- ___-/__
                </p>
                <button class="checkout">checkout my socials</button>

                </div>

            </label>

          </div>

        </div>

       </div>

        <div class="middle-box">
          <div class="interactions">
            <div class="likes">
              <img class="ent" src="icons/icons8-like-24.png">
            <span class='entities'  data-val='8090'>0 </span>
            </div>
            <div class="likes">
              <img class="ent" src="icons/icons8-speech-24.png">
            <span class='entities'  data-val='4280'> 0 </span>
            </div>
            <div class="likes">
            <img class="ent-repost" src="icons/icons8-repost-64.png">
            <span class='entities'  data-val='6090'> 0 </span>
            </div>
            <div class="likes">
            <img class="ent-share" src="icons/icons8-share-32.png">
            <span class='entities'  data-val='998'> 0 </span>
            </div>
            <div class="likes">
              <img class="ent-save" src="icons/icons8-save-32.png">
            </div>
          </div>
          <div class="user-comment">
            <span class="user-acc">
              <img class="story" src="icons/icons8-color-mode-100.png">
              _wanjiku.joy_
            </span>
            <span class="comment">
              My social media pages 
            </span>
          </div>
          <div class="another-user-comment">
            <span class="user-acc">
              <img class="story" src="icons/icons8-color-mode-100.png">
              crazyswazy._
            </span>
            <span class="some-uscomment">
              Follow me to make yours
            </span>
          </div>
          <div class="duration">
            <span class="date-posted">
              6 hrs ago.<span class="translation">See translation</span>
            </span>
          </div>
          <div class="next-post-header">
            <img class="user-profile" src="img/profwanjiku.jpg">
            <span class="some-other-user-acc">
                   _wanjiku.joy_
              <span class="music">
                <img class="msc" src="icons/icons8-musical-note-64.png">
                Olivia Dean. Baby steps
              </span>
            </span>
            <button class="follow">
              follow
            </button> 
            <div>
              <img class="menu" src="icons/icons8-ellipsis-30.png">
            </div> 
          </div>
        </div>

        <div class="bottom-img">
          <img class="bottom-post" src="img/wanjiku.png">
          <img class="cutout2" src="img/wanj1ku.png">
        </div>

        
        

    </div>

  </div>
